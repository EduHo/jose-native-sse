name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Remove macOS-only fsevents from lock file
        run: node -e "const fs=require('fs');const l=JSON.parse(fs.readFileSync('package-lock.json','utf8'));delete l.packages['node_modules/fsevents'];fs.writeFileSync('package-lock.json',JSON.stringify(l,null,2));"

      - run: npm install --ignore-scripts
      - run: npm test
      - run: npm run typecheck

  publish:
    name: Publish
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm provenance

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Remove macOS-only fsevents from lock file
        run: node -e "const fs=require('fs');const l=JSON.parse(fs.readFileSync('package-lock.json','utf8'));delete l.packages['node_modules/fsevents'];fs.writeFileSync('package-lock.json',JSON.stringify(l,null,2));"

      - run: npm install --ignore-scripts
      - run: npm run prepare   # builds lib/ and plugin/build/

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
